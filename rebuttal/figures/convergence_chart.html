<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Times New Roman', serif;
    background: #fff;
    padding: 24px;
    color: #000;
  }
  .container { max-width: 1000px; margin: 0 auto; }
  .charts-row { display: flex; gap: 20px; }
  .chart-wrapper {
    flex: 1;
    padding: 8px;
  }
  .chart-title {
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 6px;
  }
  canvas { width: 100% !important; height: 300px !important; }
</style>
</head>
<body>
<div class="container">
  <div class="charts-row">
    <div class="chart-wrapper">
      <div class="chart-title">(a) Token-Based Convergence</div>
      <canvas id="tokenChart"></canvas>
    </div>
    <div class="chart-wrapper">
      <div class="chart-title">(b) LLM Call-Based Convergence</div>
      <canvas id="callChart"></canvas>
    </div>
  </div>
</div>
<script>
const tokenData = [
  {t:1,fs:30.854,eoh:30.867,re:29.453,mcts:28.453,a2:28.670},
  {t:2,fs:30.854,eoh:30.464,re:29.453,mcts:28.232,a2:28.670},
  {t:3,fs:30.854,eoh:29.233,re:29.453,mcts:28.232,a2:27.042},
  {t:5,fs:30.854,eoh:29.233,re:29.342,mcts:28.232,a2:27.042},
  {t:8,fs:30.854,eoh:28.769,re:29.342,mcts:28.232,a2:27.042},
  {t:10,fs:30.456,eoh:27.132,re:29.342,mcts:28.013,a2:27.042},
  {t:15,fs:30.456,eoh:27.132,re:29.013,mcts:28.013,a2:27.042},
  {t:20,fs:30.456,eoh:26.571,re:29.013,mcts:27.747,a2:26.902},
  {t:30,fs:29.526,eoh:26.571,re:28.856,mcts:27.312,a2:26.902},
  {t:40,fs:28.769,eoh:26.571,re:28.732,mcts:27.312,a2:26.592},
  {t:50,fs:28.769,eoh:26.571,re:28.412,mcts:27.102,a2:26.265},
  {t:60,fs:27.010,eoh:26.275,re:28.412,mcts:27.102,a2:26.191},
  {t:70,fs:27.010,eoh:26.275,re:28.033,mcts:26.553,a2:26.191},
  {t:80,fs:27.010,eoh:26.258,re:28.033,mcts:26.553,a2:24.580},
  {t:90,fs:26.920,eoh:26.249,re:26.732,mcts:26.212,a2:24.498},
  {t:100,fs:26.920,eoh:26.217,re:26.732,mcts:25.723,a2:24.455},
  {t:120,fs:26.920,eoh:26.217,re:26.480,mcts:25.110,a2:24.455},
  {t:140,fs:26.830,eoh:26.217,re:26.480,mcts:25.010,a2:24.316},
  {t:160,fs:26.720,eoh:26.217,re:26.213,mcts:24.782,a2:23.746},
  {t:180,fs:26.720,eoh:26.217,re:25.453,mcts:24.231,a2:23.746},
  {t:200,fs:26.720,eoh:25.346,re:25.312,mcts:24.231,a2:23.236},
];

const callLabels = [5,10,15,20,30,40,50,75,100,125,150,175,200,250,300,350,400,450,500,550,600,650,700,750,800,850,900];
const callData = {
  fs:[30.66,29.96,29.74,29.74,29.74,29.74,29.74,29.74,29.74,28.42,28.42,28.14,28.00,28.00,27.95,27.75,27.63,27.60,27.60,27.47,27.36,27.27,27.16,27.16,27.16,26.99,26.99],
  eoh:[30.19,29.37,29.15,29.15,29.15,29.15,28.23,28.15,28.00,28.00,28.00,27.55,27.55,27.55,26.96,26.84,26.84,26.55,26.45,26.32,26.22,26.20,26.06,26.06,25.88,25.88,25.71],
  re:[29.48,28.57,28.39,28.05,27.75,27.74,27.74,27.42,27.19,27.19,26.81,26.73,26.71,26.71,26.71,26.33,26.33,26.12,26.00,26.00,26.00,26.00,26.00,26.00,25.61,25.34,25.34],
  mcts:[28.42,27.42,26.98,26.72,26.72,26.39,26.16,25.97,25.82,25.82,25.67,25.67,25.35,25.31,25.23,25.21,25.12,24.93,24.82,24.82,24.69,24.66,24.66,24.61,24.61,24.61,24.36],
  a2:[28.88,28.50,28.29,28.05,27.85,27.85,27.14,27.09,26.68,26.48,26.46,26.23,26.03,25.78,25.52,25.25,25.25,25.25,24.66,24.52,24.52,24.10,24.01,23.65,23.50,23.21,23.14],
};

function neg(arr) { return arr.map(v => -v); }

const colors = {
  fs:'#666666', eoh:'#d97706', re:'#7c3aed', mcts:'#0891b2', a2:'#dc2626'
};

function makeDS(label, key, data) {
  return {
    label, data,
    borderColor: colors[key],
    borderWidth: key==='a2'?2:1.5,
    pointRadius: key==='a2'?3:2,
    pointHoverRadius: key==='a2'?3:2,
    borderDash: [6,3],
    tension: 0.2, fill: false,
  };
}

const font = "'Times New Roman', serif";

const sharedOpts = {
  responsive:true, maintainAspectRatio:false,
  animation:false,
  interaction:{mode:null},
  plugins:{
    legend:{
      position:'bottom',
      labels:{
        font:{family:font,size:11},
        padding:10,
        usePointStyle:true,
        pointStyleWidth:20,
        color:'#000',
      }
    },
    tooltip:{enabled:false}
  },
  scales:{
    y:{
      title:{display:true,text:'Best Score',font:{family:font,size:12},color:'#000'},
      grid:{color:'rgba(0,0,0,0.08)',drawTicks:true},
      ticks:{font:{family:font,size:10},color:'#000'},
      border:{color:'#000'}
    },
    x:{
      grid:{color:'rgba(0,0,0,0.08)',drawTicks:true},
      ticks:{font:{family:font,size:10},color:'#000',maxTicksLimit:8},
      border:{color:'#000'}
    }
  }
};

new Chart(document.getElementById('tokenChart'),{
  type:'line',
  data:{
    labels:tokenData.map(d=>d.t),
    datasets:[
      makeDS('FunSearch','fs',tokenData.map(d=>-d.fs)),
      makeDS('EoH','eoh',tokenData.map(d=>-d.eoh)),
      makeDS('ReEvo','re',tokenData.map(d=>-d.re)),
      makeDS('MCTS-AHD','mcts',tokenData.map(d=>-d.mcts)),
      makeDS('A₂DEPT (Ours)','a2',tokenData.map(d=>-d.a2)),
    ]
  },
  options:{...sharedOpts,scales:{...sharedOpts.scales,x:{...sharedOpts.scales.x,title:{display:true,text:'Output Tokens (×10⁵)',font:{family:font,size:12},color:'#000'}}}}
});

new Chart(document.getElementById('callChart'),{
  type:'line',
  data:{
    labels:callLabels,
    datasets:[
      makeDS('FunSearch','fs',neg(callData.fs)),
      makeDS('EoH','eoh',neg(callData.eoh)),
      makeDS('ReEvo','re',neg(callData.re)),
      makeDS('MCTS-AHD','mcts',neg(callData.mcts)),
      makeDS('A₂DEPT (Ours)','a2',neg(callData.a2)),
    ]
  },
  options:{...sharedOpts,scales:{...sharedOpts.scales,x:{...sharedOpts.scales.x,title:{display:true,text:'Number of LLM Calls',font:{family:font,size:12},color:'#000'}}}}
});
</script>
</body>
</html>
